<!DOCTYPE html>
<html lang="sv">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>AI Assistent</title>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&display=swap');

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #f3f4f7;
      --card: #ffffff;
      --border: #e0e2e8;
      --primary: #0e9a83;
      --primary-fg: #ffffff;
      --text: #1a1d26;
      --text-muted: #6b7280;
      --chat-user-bg: #d6f5ef;
      --chat-user-fg: #0c3d33;
      --chat-ai-bg: #ffffff;
      --chat-ai-fg: #1a1d26;
      --accent-bg: #e8f8f4;
      --accent-fg: #0e9a83;
      --input-bg: #f3f4f7;
      --shadow: 0 1px 3px rgba(0,0,0,0.06);
    }

    body {
      font-family: 'Space Grotesk', system-ui, -apple-system, sans-serif;
      background: var(--bg);
      color: var(--text);
      height: 100vh;
      display: flex;
      flex-direction: column;
      overflow: hidden;
      -webkit-font-smoothing: antialiased;
    }

    /* Header */
    .header {
      display: flex;
      align-items: center;
      gap: 12px;
      padding: 12px 16px;
      background: var(--card);
      border-bottom: 1px solid var(--border);
    }
    .header-icon {
      width: 36px; height: 36px;
      border-radius: 12px;
      background: var(--primary);
      display: flex; align-items: center; justify-content: center;
    }
    .header-icon svg { width: 18px; height: 18px; color: var(--primary-fg); }
    .header h1 { font-size: 16px; font-weight: 600; line-height: 1.2; }
    .header p { font-size: 12px; color: var(--text-muted); }

    /* Messages area */
    .messages {
      flex: 1;
      overflow-y: auto;
      padding: 24px 16px;
      scroll-behavior: smooth;
    }
    .messages-inner {
      max-width: 640px;
      margin: 0 auto;
      display: flex;
      flex-direction: column;
      gap: 16px;
    }

    /* Empty state */
    .empty {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      height: 100%;
      gap: 20px;
      max-width: 420px;
      margin: 0 auto;
      text-align: center;
    }
    .empty-icon {
      width: 64px; height: 64px;
      border-radius: 16px;
      background: var(--accent-bg);
      display: flex; align-items: center; justify-content: center;
    }
    .empty-icon svg { width: 28px; height: 28px; color: var(--accent-fg); }
    .empty h2 { font-size: 20px; font-weight: 600; }
    .empty p { font-size: 14px; color: var(--text-muted); }
    .suggestions {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 8px;
      width: 100%;
    }
    @media (max-width: 500px) { .suggestions { grid-template-columns: 1fr; } }
    .suggestion-btn {
      text-align: left;
      font-size: 13px;
      padding: 12px 16px;
      border-radius: 12px;
      border: 1px solid var(--border);
      background: var(--card);
      cursor: pointer;
      font-family: inherit;
      color: var(--text);
      transition: background 0.15s, border-color 0.15s;
    }
    .suggestion-btn:hover {
      background: var(--accent-bg);
      border-color: var(--primary);
    }

    /* Chat message */
    .msg { display: flex; gap: 10px; }
    .msg.user { flex-direction: row-reverse; }
    .msg-avatar {
      flex-shrink: 0;
      width: 32px; height: 32px;
      border-radius: 50%;
      display: flex; align-items: center; justify-content: center;
    }
    .msg-avatar svg { width: 16px; height: 16px; }
    .msg.user .msg-avatar { background: var(--primary); color: var(--primary-fg); }
    .msg.assistant .msg-avatar { background: var(--accent-bg); color: var(--accent-fg); }
    .msg-bubble {
      max-width: 80%;
      padding: 12px 16px;
      border-radius: 16px;
      font-size: 14px;
      line-height: 1.6;
      word-break: break-word;
    }
    .msg.user .msg-bubble {
      background: var(--chat-user-bg);
      color: var(--chat-user-fg);
      border-top-right-radius: 4px;
    }
    .msg.assistant .msg-bubble {
      background: var(--chat-ai-bg);
      color: var(--chat-ai-fg);
      border-top-left-radius: 4px;
      box-shadow: var(--shadow);
      border: 1px solid var(--border);
    }
    .msg-bubble p { margin: 0 0 8px 0; }
    .msg-bubble p:last-child { margin-bottom: 0; }
    .msg-bubble code {
      background: var(--input-bg);
      padding: 2px 6px;
      border-radius: 4px;
      font-size: 12px;
      font-family: 'Courier New', monospace;
    }
    .msg-bubble pre {
      background: var(--input-bg);
      padding: 12px;
      border-radius: 8px;
      overflow-x: auto;
      margin: 8px 0;
      font-size: 12px;
    }
    .msg-bubble pre code { background: none; padding: 0; }
    .msg-bubble ul, .msg-bubble ol { padding-left: 20px; margin: 4px 0; }
    .msg-bubble strong { font-weight: 600; }

    /* Typing indicator */
    .typing { display: flex; gap: 10px; }
    .typing-dots {
      display: flex; gap: 6px;
      padding: 12px 16px;
      background: var(--chat-ai-bg);
      border: 1px solid var(--border);
      border-radius: 16px;
      border-top-left-radius: 4px;
      box-shadow: var(--shadow);
    }
    .typing-dot {
      width: 8px; height: 8px;
      border-radius: 50%;
      background: var(--text-muted);
      animation: pulse 1.4s infinite ease-in-out;
    }
    .typing-dot:nth-child(2) { animation-delay: 0.2s; }
    .typing-dot:nth-child(3) { animation-delay: 0.4s; }
    @keyframes pulse {
      0%, 80%, 100% { opacity: 0.3; transform: scale(0.8); }
      40% { opacity: 1; transform: scale(1); }
    }

    /* Input area */
    .input-area {
      padding: 12px 16px;
      background: var(--card);
      border-top: 1px solid var(--border);
    }
    .input-inner {
      max-width: 640px;
      margin: 0 auto;
      display: flex;
      gap: 8px;
      align-items: flex-end;
    }
    .input-inner textarea {
      flex: 1;
      resize: none;
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 10px 16px;
      font-size: 14px;
      font-family: inherit;
      background: var(--input-bg);
      color: var(--text);
      outline: none;
      min-height: 40px;
      max-height: 120px;
      line-height: 1.4;
    }
    .input-inner textarea:focus {
      border-color: var(--primary);
      box-shadow: 0 0 0 2px rgba(14, 154, 131, 0.15);
    }
    .input-inner textarea::placeholder { color: var(--text-muted); }
    .send-btn {
      width: 40px; height: 40px;
      flex-shrink: 0;
      border-radius: 12px;
      border: none;
      background: var(--primary);
      color: var(--primary-fg);
      cursor: pointer;
      display: flex; align-items: center; justify-content: center;
      transition: opacity 0.15s;
    }
    .send-btn:disabled { opacity: 0.4; cursor: not-allowed; }
    .send-btn:not(:disabled):hover { opacity: 0.85; }
    .send-btn svg { width: 16px; height: 16px; }
  </style>
</head>
<body>

  <!-- Header -->
  <div class="header">
    <div class="header-icon">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <path d="m12 3-1.912 5.813a2 2 0 0 1-1.275 1.275L3 12l5.813 1.912a2 2 0 0 1 1.275 1.275L12 21l1.912-5.813a2 2 0 0 1 1.275-1.275L21 12l-5.813-1.912a2 2 0 0 1-1.275-1.275L12 3Z"/>
        <path d="M5 3v4"/><path d="M19 17v4"/><path d="M3 5h4"/><path d="M17 19h4"/>
      </svg>
    </div>
    <div>
      <h1>AI Assistent</h1>
      <p>Fråga mig vad som helst</p>
    </div>
  </div>

  <!-- Messages -->
  <div class="messages" id="messages">
    <div class="empty" id="empty">
      <div class="empty-icon">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <path d="m12 3-1.912 5.813a2 2 0 0 1-1.275 1.275L3 12l5.813 1.912a2 2 0 0 1 1.275 1.275L12 21l1.912-5.813a2 2 0 0 1 1.275-1.275L21 12l-5.813-1.912a2 2 0 0 1-1.275-1.275L12 3Z"/>
          <path d="M5 3v4"/><path d="M19 17v4"/><path d="M3 5h4"/><path d="M17 19h4"/>
        </svg>
      </div>
      <div>
        <h2>Hej! 👋</h2>
        <p>Jag är din AI-assistent. Ställ en fråga eller välj ett förslag nedan.</p>
      </div>
      <div class="suggestions">
        <button class="suggestion-btn" onclick="send('Förklara hur internet fungerar')">Förklara hur internet fungerar</button>
        <button class="suggestion-btn" onclick="send('Ge mig tips för att plugga effektivt')">Ge mig tips för att plugga effektivt</button>
        <button class="suggestion-btn" onclick="send('Skriv en kort dikt om programmering')">Skriv en kort dikt om programmering</button>
        <button class="suggestion-btn" onclick="send('Vad är artificiell intelligens?')">Vad är artificiell intelligens?</button>
      </div>
    </div>
    <div class="messages-inner" id="msgList" style="display:none;"></div>
  </div>

  <!-- Input -->
  <div class="input-area">
    <div class="input-inner">
      <textarea id="input" rows="1" placeholder="Skriv ett meddelande..." onkeydown="handleKey(event)" oninput="autoGrow(this)"></textarea>
      <button class="send-btn" id="sendBtn" onclick="send()" disabled>
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <path d="m22 2-7 20-4-9-9-4z"/><path d="M22 2 11 13"/>
        </svg>
      </button>
    </div>
  </div>

  <script>
    const CHAT_URL = "https://uthfklmmfbjuxnrshejk.supabase.co/functions/v1/chat";
    const ANON_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InV0aGZrbG1tZmJqdXhucnNoZWprIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzI2Mjg2MDIsImV4cCI6MjA4ODIwNDYwMn0.94AlXJuyzmZqmeGPJ1wsADsopaDGnML0HqgSyV4oHr0";

    let messages = [];
    let loading = false;

    const inputEl = document.getElementById("input");
    const sendBtn = document.getElementById("sendBtn");
    const msgList = document.getElementById("msgList");
    const emptyEl = document.getElementById("empty");
    const msgsContainer = document.getElementById("messages");

    inputEl.addEventListener("input", () => {
      sendBtn.disabled = !inputEl.value.trim() || loading;
    });

    function autoGrow(el) {
      el.style.height = "auto";
      el.style.height = Math.min(el.scrollHeight, 120) + "px";
    }

    function handleKey(e) {
      if (e.key === "Enter" && !e.shiftKey) {
        e.preventDefault();
        send();
      }
    }

    function scrollDown() {
      msgsContainer.scrollTop = msgsContainer.scrollHeight;
    }

    // Simple markdown: bold, italic, code blocks, inline code, lists, paragraphs
    function renderMarkdown(text) {
      let html = text
        // Code blocks
        .replace(/```(\w*)\n([\s\S]*?)```/g, '<pre><code>$2</code></pre>')
        // Inline code
        .replace(/`([^`]+)`/g, '<code>$1</code>')
        // Bold
        .replace(/\*\*(.+?)\*\*/g, '<strong>$1</strong>')
        // Italic
        .replace(/\*(.+?)\*/g, '<em>$1</em>')
        // Unordered lists
        .replace(/^[-*] (.+)$/gm, '<li>$1</li>')
        // Ordered lists
        .replace(/^\d+\. (.+)$/gm, '<li>$1</li>');

      // Wrap consecutive <li> in <ul>
      html = html.replace(/((?:<li>.*<\/li>\n?)+)/g, '<ul>$1</ul>');

      // Paragraphs
      html = html.split(/\n\n+/).map(p => {
        p = p.trim();
        if (!p) return '';
        if (p.startsWith('<pre>') || p.startsWith('<ul>') || p.startsWith('<ol>')) return p;
        return '<p>' + p.replace(/\n/g, '<br>') + '</p>';
      }).join('');

      return html;
    }

    const userSvg = '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M19 21v-2a4 4 0 0 0-4-4H9a4 4 0 0 0-4 4v2"/><circle cx="12" cy="7" r="4"/></svg>';
    const botSvg = '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M12 8V4H8"/><rect width="16" height="12" x="4" y="8" rx="2"/><path d="M2 14h2"/><path d="M20 14h2"/><path d="M15 13v2"/><path d="M9 13v2"/></svg>';

    function addMessage(role, content) {
      const div = document.createElement("div");
      div.className = "msg " + role;
      div.innerHTML = `
        <div class="msg-avatar">${role === "user" ? userSvg : botSvg}</div>
        <div class="msg-bubble">${role === "user" ? '<p>' + escapeHtml(content) + '</p>' : renderMarkdown(content)}</div>
      `;
      msgList.appendChild(div);
      return div;
    }

    function escapeHtml(str) {
      return str.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
    }

    function showTyping() {
      const div = document.createElement("div");
      div.className = "typing";
      div.id = "typingIndicator";
      div.innerHTML = `
        <div class="msg-avatar" style="background:var(--accent-bg);color:var(--accent-fg)">${botSvg}</div>
        <div class="typing-dots"><div class="typing-dot"></div><div class="typing-dot"></div><div class="typing-dot"></div></div>
      `;
      msgList.appendChild(div);
      scrollDown();
    }

    function hideTyping() {
      const el = document.getElementById("typingIndicator");
      if (el) el.remove();
    }

    async function send(text) {
      const content = (text || inputEl.value).trim();
      if (!content || loading) return;

      inputEl.value = "";
      inputEl.style.height = "auto";
      sendBtn.disabled = true;
      loading = true;

      // Show messages area
      emptyEl.style.display = "none";
      msgList.style.display = "flex";

      // Add user message
      messages.push({ role: "user", content });
      addMessage("user", content);
      scrollDown();

      // Show typing
      showTyping();

      try {
        const resp = await fetch(CHAT_URL, {
          method: "POST",
          headers: {
            "Content-Type": "application/json",
            "Authorization": "Bearer " + ANON_KEY,
          },
          body: JSON.stringify({ messages }),
        });

        hideTyping();

        if (!resp.ok) {
          const errMsg = resp.status === 429 ? "För många förfrågningar, vänta lite." :
                         resp.status === 402 ? "Krediter slut." : "Något gick fel.";
          addMessage("assistant", errMsg);
          loading = false;
          sendBtn.disabled = false;
          return;
        }

        // Stream response
        const reader = resp.body.getReader();
        const decoder = new TextDecoder();
        let buffer = "";
        let assistantText = "";
        let assistantDiv = null;

        while (true) {
          const { done, value } = await reader.read();
          if (done) break;
          buffer += decoder.decode(value, { stream: true });

          let idx;
          while ((idx = buffer.indexOf("\n")) !== -1) {
            let line = buffer.slice(0, idx);
            buffer = buffer.slice(idx + 1);
            if (line.endsWith("\r")) line = line.slice(0, -1);
            if (!line.startsWith("data: ")) continue;
            const json = line.slice(6).trim();
            if (json === "[DONE]") break;
            try {
              const parsed = JSON.parse(json);
              const delta = parsed.choices?.[0]?.delta?.content;
              if (delta) {
                assistantText += delta;
                if (!assistantDiv) {
                  assistantDiv = addMessage("assistant", assistantText);
                } else {
                  assistantDiv.querySelector(".msg-bubble").innerHTML = renderMarkdown(assistantText);
                }
                scrollDown();
              }
            } catch {
              buffer = line + "\n" + buffer;
              break;
            }
          }
        }

        if (assistantText) {
          messages.push({ role: "assistant", content: assistantText });
        }

      } catch (err) {
        hideTyping();
        addMessage("assistant", "Kunde inte ansluta till AI:n. Kontrollera din internetanslutning.");
      }

      loading = false;
      sendBtn.disabled = !inputEl.value.trim();
      inputEl.focus();
      scrollDown();
    }
  </script>
</body>
</html>
