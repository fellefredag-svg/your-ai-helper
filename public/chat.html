<!DOCTYPE html>
<html lang="sv">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>AI Assistent</title>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&display=swap');

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #f3f4f7;
      --card: #ffffff;
      --border: #e0e2e8;
      --primary: #0e9a83;
      --primary-fg: #ffffff;
      --text: #1a1d26;
      --text-muted: #6b7280;
      --chat-user-bg: #d6f5ef;
      --chat-user-fg: #0c3d33;
      --chat-ai-bg: #ffffff;
      --chat-ai-fg: #1a1d26;
      --accent-bg: #e8f8f4;
      --accent-fg: #0e9a83;
      --input-bg: #f3f4f7;
      --shadow: 0 1px 3px rgba(0,0,0,0.06);
      --sidebar-w: 260px;
      --danger: #ef4444;
    }

    body {
      font-family: 'Space Grotesk', system-ui, -apple-system, sans-serif;
      background: var(--bg);
      color: var(--text);
      height: 100vh;
      display: flex;
      overflow: hidden;
      -webkit-font-smoothing: antialiased;
    }

    /* Sidebar */
    .sidebar {
      width: var(--sidebar-w);
      background: var(--card);
      border-right: 1px solid var(--border);
      display: flex;
      flex-direction: column;
      flex-shrink: 0;
      height: 100vh;
      transition: transform 0.2s;
    }
    .sidebar.hidden { transform: translateX(-100%); position: absolute; z-index: 10; height: 100%; }
    .sidebar-header {
      padding: 12px;
      border-bottom: 1px solid var(--border);
      display: flex;
      gap: 8px;
    }
    .new-chat-btn {
      flex: 1;
      padding: 8px 12px;
      border-radius: 10px;
      border: 1px solid var(--border);
      background: var(--accent-bg);
      color: var(--accent-fg);
      cursor: pointer;
      font-family: inherit;
      font-size: 13px;
      font-weight: 600;
      display: flex;
      align-items: center;
      gap: 6px;
      transition: background 0.15s;
    }
    .new-chat-btn:hover { background: var(--primary); color: var(--primary-fg); }
    .chat-list {
      flex: 1;
      overflow-y: auto;
      padding: 8px;
    }
    .chat-item {
      display: flex;
      align-items: center;
      padding: 10px 12px;
      border-radius: 10px;
      cursor: pointer;
      font-size: 13px;
      margin-bottom: 2px;
      transition: background 0.15s;
      gap: 8px;
    }
    .chat-item:hover { background: var(--input-bg); }
    .chat-item.active { background: var(--accent-bg); color: var(--accent-fg); font-weight: 500; }
    .chat-item-title { flex: 1; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
    .chat-item-delete {
      opacity: 0;
      border: none;
      background: none;
      color: var(--danger);
      cursor: pointer;
      padding: 2px;
      border-radius: 4px;
      display: flex;
      align-items: center;
    }
    .chat-item:hover .chat-item-delete { opacity: 1; }
    .chat-item-delete:hover { background: rgba(239,68,68,0.1); }

    /* Main */
    .main {
      flex: 1;
      display: flex;
      flex-direction: column;
      min-width: 0;
    }

    /* Header */
    .header {
      display: flex;
      align-items: center;
      gap: 12px;
      padding: 12px 16px;
      background: var(--card);
      border-bottom: 1px solid var(--border);
    }
    .menu-btn, .settings-btn {
      border: none;
      background: none;
      cursor: pointer;
      color: var(--text);
      padding: 4px;
      display: flex;
      align-items: center;
      border-radius: 8px;
      transition: background 0.15s;
    }
    .menu-btn { display: none; }
    .settings-btn:hover { background: var(--input-bg); }
    .settings-btn.active { background: var(--accent-bg); color: var(--accent-fg); }
    .header-spacer { flex: 1; }
    @media (max-width: 700px) {
      .sidebar { position: absolute; z-index: 10; height: 100%; transform: translateX(-100%); }
      .sidebar.open { transform: translateX(0); }
      .menu-btn { display: flex; }
      .overlay { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.3); z-index: 9; }
      .overlay.show { display: block; }
    }
    .header-icon {
      width: 36px; height: 36px;
      border-radius: 12px;
      background: var(--primary);
      display: flex; align-items: center; justify-content: center;
    }
    .header-icon svg { width: 18px; height: 18px; color: var(--primary-fg); }
    .header h1 { font-size: 16px; font-weight: 600; line-height: 1.2; }
    .header p { font-size: 12px; color: var(--text-muted); }

    /* Theme panel */
    .theme-panel {
      display: none;
      position: absolute;
      top: 56px;
      right: 16px;
      z-index: 50;
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 16px;
      padding: 20px;
      box-shadow: 0 8px 32px rgba(0,0,0,0.12);
      width: 280px;
      animation: panelIn 0.2s ease-out;
    }
    .theme-panel.open { display: block; }
    @keyframes panelIn {
      from { opacity: 0; transform: translateY(-8px) scale(0.96); }
      to { opacity: 1; transform: translateY(0) scale(1); }
    }
    .theme-panel h3 {
      font-size: 14px;
      font-weight: 600;
      margin-bottom: 16px;
      text-align: center;
    }

    /* Color wheel */
    .color-wheel {
      position: relative;
      width: 200px;
      height: 200px;
      margin: 0 auto 16px;
    }
    .color-swatch {
      position: absolute;
      width: 44px;
      height: 44px;
      border-radius: 50%;
      border: 3px solid var(--card);
      cursor: pointer;
      transition: transform 0.2s, box-shadow 0.2s;
      box-shadow: 0 2px 8px rgba(0,0,0,0.12);
      display: flex;
      align-items: center;
      justify-content: center;
    }
    .color-swatch:hover { transform: scale(1.15); }
    .color-swatch.active {
      border-color: var(--text);
      transform: scale(1.2);
      box-shadow: 0 4px 16px rgba(0,0,0,0.2);
    }
    .color-swatch svg { width: 18px; height: 18px; opacity: 0; }
    .color-swatch.active svg { opacity: 1; }

    .theme-name {
      text-align: center;
      font-size: 13px;
      font-weight: 500;
      color: var(--text-muted);
    }

    /* Messages area */
    .messages {
      flex: 1;
      overflow-y: auto;
      padding: 24px 16px;
      scroll-behavior: smooth;
    }
    .messages-inner {
      max-width: 640px;
      margin: 0 auto;
      display: flex;
      flex-direction: column;
      gap: 16px;
    }

    /* Empty state */
    .empty {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      height: 100%;
      gap: 20px;
      max-width: 420px;
      margin: 0 auto;
      text-align: center;
    }
    .empty-icon {
      width: 64px; height: 64px;
      border-radius: 16px;
      background: var(--accent-bg);
      display: flex; align-items: center; justify-content: center;
    }
    .empty-icon svg { width: 28px; height: 28px; color: var(--accent-fg); }
    .empty h2 { font-size: 20px; font-weight: 600; }
    .empty p { font-size: 14px; color: var(--text-muted); }
    .suggestions {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 8px;
      width: 100%;
    }
    @media (max-width: 500px) { .suggestions { grid-template-columns: 1fr; } }
    .suggestion-btn {
      text-align: left;
      font-size: 13px;
      padding: 12px 16px;
      border-radius: 12px;
      border: 1px solid var(--border);
      background: var(--card);
      cursor: pointer;
      font-family: inherit;
      color: var(--text);
      transition: background 0.15s, border-color 0.15s;
    }
    .suggestion-btn:hover {
      background: var(--accent-bg);
      border-color: var(--primary);
    }

    /* Chat message */
    .msg { display: flex; gap: 10px; }
    .msg.user { flex-direction: row-reverse; }
    .msg-avatar {
      flex-shrink: 0;
      width: 32px; height: 32px;
      border-radius: 50%;
      display: flex; align-items: center; justify-content: center;
    }
    .msg-avatar svg { width: 16px; height: 16px; }
    .msg.user .msg-avatar { background: var(--primary); color: var(--primary-fg); }
    .msg.assistant .msg-avatar { background: var(--accent-bg); color: var(--accent-fg); }
    .msg-bubble {
      max-width: 80%;
      padding: 12px 16px;
      border-radius: 16px;
      font-size: 14px;
      line-height: 1.6;
      word-break: break-word;
    }
    .msg.user .msg-bubble {
      background: var(--chat-user-bg);
      color: var(--chat-user-fg);
      border-top-right-radius: 4px;
    }
    .msg.assistant .msg-bubble {
      background: var(--chat-ai-bg);
      color: var(--chat-ai-fg);
      border-top-left-radius: 4px;
      box-shadow: var(--shadow);
      border: 1px solid var(--border);
    }
    .msg-bubble p { margin: 0 0 8px 0; }
    .msg-bubble p:last-child { margin-bottom: 0; }
    .msg-bubble code {
      background: var(--input-bg);
      padding: 2px 6px;
      border-radius: 4px;
      font-size: 12px;
      font-family: 'Courier New', monospace;
    }
    .msg-bubble pre {
      background: var(--input-bg);
      padding: 12px;
      border-radius: 8px;
      overflow-x: auto;
      margin: 8px 0;
      font-size: 12px;
    }
    .msg-bubble pre code { background: none; padding: 0; }
    .msg-bubble ul, .msg-bubble ol { padding-left: 20px; margin: 4px 0; }
    .msg-bubble strong { font-weight: 600; }

    /* Typing indicator */
    .typing { display: flex; gap: 10px; }
    .typing-dots {
      display: flex; gap: 6px;
      padding: 12px 16px;
      background: var(--chat-ai-bg);
      border: 1px solid var(--border);
      border-radius: 16px;
      border-top-left-radius: 4px;
      box-shadow: var(--shadow);
    }
    .typing-dot {
      width: 8px; height: 8px;
      border-radius: 50%;
      background: var(--text-muted);
      animation: pulse 1.4s infinite ease-in-out;
    }
    .typing-dot:nth-child(2) { animation-delay: 0.2s; }
    .typing-dot:nth-child(3) { animation-delay: 0.4s; }
    @keyframes pulse {
      0%, 80%, 100% { opacity: 0.3; transform: scale(0.8); }
      40% { opacity: 1; transform: scale(1); }
    }

    /* Input area */
    .input-area {
      padding: 12px 16px;
      background: var(--card);
      border-top: 1px solid var(--border);
    }
    .input-inner {
      max-width: 640px;
      margin: 0 auto;
      display: flex;
      gap: 8px;
      align-items: flex-end;
    }
    .input-inner textarea {
      flex: 1;
      resize: none;
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 10px 16px;
      font-size: 14px;
      font-family: inherit;
      background: var(--input-bg);
      color: var(--text);
      outline: none;
      min-height: 40px;
      max-height: 120px;
      line-height: 1.4;
    }
    .input-inner textarea:focus {
      border-color: var(--primary);
      box-shadow: 0 0 0 2px rgba(14, 154, 131, 0.15);
    }
    .input-inner textarea::placeholder { color: var(--text-muted); }
    .send-btn, .img-btn {
      width: 40px; height: 40px;
      flex-shrink: 0;
      border-radius: 12px;
      border: none;
      cursor: pointer;
      display: flex; align-items: center; justify-content: center;
      transition: opacity 0.15s, background 0.15s;
    }
    .send-btn {
      background: var(--primary);
      color: var(--primary-fg);
    }
    .img-btn {
      background: var(--accent-bg);
      color: var(--accent-fg);
    }
    .img-btn:hover { opacity: 0.85; }
    .send-btn:disabled, .img-btn:disabled { opacity: 0.4; cursor: not-allowed; }
    .send-btn:not(:disabled):hover { opacity: 0.85; }
    .send-btn svg, .img-btn svg { width: 16px; height: 16px; }
    .msg-bubble img { max-width: 100%; border-radius: 12px; margin: 8px 0; }
    .img-loading { display: flex; align-items: center; gap: 8px; padding: 12px 16px; font-size: 13px; color: var(--text-muted); }
    .img-loading .spinner { width: 18px; height: 18px; border: 2px solid var(--border); border-top-color: var(--primary); border-radius: 50%; animation: spin 0.8s linear infinite; }
    @keyframes spin { to { transform: rotate(360deg); } }

    .no-chats { padding: 20px; text-align: center; font-size: 13px; color: var(--text-muted); }
  </style>
</head>

      { name: "Skogsgrön", color: "#2e7d32", bg: "#f0f7f0", card: "#ffffff", border: "#c0dcc0", text: "#1a2a1a", textMuted: "#5a7a5a", userBg: "#c8f0c8", userFg: "#0a3a0a", aiBg: "#ffffff", aiFg: "#1a2a1a", accentBg: "#e0f5e0", accentFg: "#2e7d32", inputBg: "#f0f7f0" },
      { name: "Rosé", color: "#d81b60", bg: "#fef0f5", card: "#ffffff", border: "#f0c0d0", text: "#2a101a", textMuted: "#9a5a7a", userBg: "#ffd0e0", userFg: "#6a0a2a", aiBg: "#ffffff", aiFg: "#2a101a", accentBg: "#ffe8f0", accentFg: "#d81b60", inputBg: "#fef0f5" },
      { name: "Svart & Vitt", color: "#000000", bg: "#ffffff", card: "#ffffff", border: "#e0e0e0", text: "#000000", textMuted: "#666666", userBg: "#000000", userFg: "#ffffff", aiBg: "#f5f5f5", aiFg: "#000000", accentBg: "#f0f0f0", accentFg: "#000000", inputBg: "#f5f5f5" },
      { name: "Midnatt", color: "#00bcd4", bg: "#0a0e14", card: "#12181f", border: "#1e2832", text: "#d0dce8", textMuted: "#607080", userBg: "#0a3040", userFg: "#80e0f0", aiBg: "#151d25", aiFg: "#c8d8e8", accentBg: "#0e2030", accentFg: "#00bcd4", inputBg: "#0e1318", primaryFg: "#ffffff", primary: "#00bcd4" },
      { name: "Guld", color: "#f9a825", bg: "#fefcf5", card: "#ffffff", border: "#f0e0b0", text: "#2a2010", textMuted: "#8a7a50", userBg: "#fff0c0", userFg: "#5a4000", aiBg: "#ffffff", aiFg: "#2a2010", accentBg: "#fff8e0", accentFg: "#e09000", inputBg: "#fefcf5" },
      { name: "Korall", color: "#ff6f61", bg: "#fff5f3", card: "#ffffff", border: "#f0c8c0", text: "#2a1510", textMuted: "#9a6a60", userBg: "#ffd8d0", userFg: "#6a1a10", aiBg: "#ffffff", aiFg: "#2a1510", accentBg: "#ffe8e5", accentFg: "#ff6f61", inputBg: "#fff5f3" },
      { name: "Neon", color: "#39ff14", bg: "#0a0a0a", card: "#141414", border: "#252525", text: "#e0ffe0", textMuted: "#60a060", userBg: "#0a2a0a", userFg: "#60ff40", aiBg: "#181818", aiFg: "#d0f0d0", accentBg: "#0f1f0f", accentFg: "#39ff14", inputBg: "#0e0e0e", primaryFg: "#000000", primary: "#39ff14" },
    ];

    let currentThemeIdx = 0;

    function applyTheme(idx) {
      const t = themes[idx];
      const r = document.documentElement.style;
      r.setProperty('--bg', t.bg);
      r.setProperty('--card', t.card);
      r.setProperty('--border', t.border);
      r.setProperty('--primary', t.primary || t.color);
      r.setProperty('--primary-fg', t.primaryFg || '#ffffff');
      r.setProperty('--text', t.text);
      r.setProperty('--text-muted', t.textMuted);
      r.setProperty('--chat-user-bg', t.userBg);
      r.setProperty('--chat-user-fg', t.userFg);
      r.setProperty('--chat-ai-bg', t.aiBg);
      r.setProperty('--chat-ai-fg', t.aiFg);
      r.setProperty('--accent-bg', t.accentBg);
      r.setProperty('--accent-fg', t.accentFg);
      r.setProperty('--input-bg', t.inputBg);
      currentThemeIdx = idx;
      localStorage.setItem(THEME_KEY, idx);
      document.getElementById('themeName').textContent = t.name;
      renderWheel();
    }

    function renderWheel() {
      const wheel = document.getElementById('colorWheel');
      wheel.innerHTML = '';
      const count = themes.length;
      const cx = 100, cy = 100, radius = 78;
      const checkSvg = '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"><polyline points="20 6 9 17 4 12"/></svg>';

      themes.forEach((t, i) => {
        const angle = (i / count) * Math.PI * 2 - Math.PI / 2;
        const x = cx + radius * Math.cos(angle) - 22;
        const y = cy + radius * Math.sin(angle) - 22;
        const swatch = document.createElement('div');
        swatch.className = 'color-swatch' + (i === currentThemeIdx ? ' active' : '');
        swatch.style.left = x + 'px';
        swatch.style.top = y + 'px';
        swatch.style.background = t.color;
        // set check color based on brightness
        const bright = isLight(t.color);
        swatch.innerHTML = `<span style="color:${bright ? '#000' : '#fff'}">${checkSvg}</span>`;
        swatch.onclick = () => applyTheme(i);
        swatch.title = t.name;
        wheel.appendChild(swatch);
      });
    }

    function isLight(hex) {
      const r = parseInt(hex.slice(1,3),16), g = parseInt(hex.slice(3,5),16), b = parseInt(hex.slice(5,7),16);
      return (r*299 + g*587 + b*114) / 1000 > 150;
    }

    function toggleThemePanel() {
      const panel = document.getElementById('themePanel');
      const btn = document.getElementById('settingsBtn');
      const isOpen = panel.classList.toggle('open');
      btn.classList.toggle('active', isOpen);
    }

    // Close theme panel when clicking outside
    document.addEventListener('click', (e) => {
      const panel = document.getElementById('themePanel');
      const btn = document.getElementById('settingsBtn');
      if (panel.classList.contains('open') && !panel.contains(e.target) && !btn.contains(e.target)) {
        panel.classList.remove('open');
        btn.classList.remove('active');
      }
    });

    // ── Chat logic ──
    let messages = [];
    let loading = false;
    let currentChatId = null;
    let chats = {};

    const inputEl = document.getElementById("input");
    const sendBtn = document.getElementById("sendBtn");
    const imgBtn = document.getElementById("imgBtn");
    const msgList = document.getElementById("msgList");
    const emptyEl = document.getElementById("empty");
    const msgsContainer = document.getElementById("messages");
    const chatListEl = document.getElementById("chatList");
    const noChatsEl = document.getElementById("noChats");
    const sidebarEl = document.getElementById("sidebar");
    const overlayEl = document.getElementById("overlay");

    function loadChats() {
      try {
        const data = localStorage.getItem(STORAGE_KEY);
        if (data) chats = JSON.parse(data);
      } catch { chats = {}; }
    }

    function saveChats() {
      localStorage.setItem(STORAGE_KEY, JSON.stringify(chats));
    }

    function generateId() {
      return Date.now().toString(36) + Math.random().toString(36).slice(2, 7);
    }

    function renderChatList() {
      const sorted = Object.entries(chats).sort((a, b) => b[1].updatedAt - a[1].updatedAt);
      noChatsEl.style.display = sorted.length ? "none" : "block";
      chatListEl.querySelectorAll(".chat-item").forEach(el => el.remove());

      sorted.forEach(([id, chat]) => {
        const div = document.createElement("div");
        div.className = "chat-item" + (id === currentChatId ? " active" : "");
        div.innerHTML = `
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"/></svg>
          <span class="chat-item-title">${escapeHtml(chat.title)}</span>
          <button class="chat-item-delete" title="Radera" onclick="event.stopPropagation(); deleteChat('${id}')">
            <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="3 6 5 6 21 6"/><path d="M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6m3 0V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2"/></svg>
          </button>
        `;
        div.onclick = () => loadChat(id);
        chatListEl.appendChild(div);
      });
    }

    function newChat() {
      currentChatId = null;
      messages = [];
      msgList.innerHTML = "";
      msgList.style.display = "none";
      emptyEl.style.display = "flex";
      renderChatList();
      closeSidebar();
      inputEl.focus();
    }

    function loadChat(id) {
      const chat = chats[id];
      if (!chat) return;
      currentChatId = id;
      messages = [...chat.messages];
      msgList.innerHTML = "";
      emptyEl.style.display = "none";
      msgList.style.display = "flex";
      messages.forEach(m => addMessage(m.role, m.content));
      renderChatList();
      closeSidebar();
      scrollDown();
    }

    function saveCurrentChat() {
      if (!messages.length) return;
      if (!currentChatId) currentChatId = generateId();
      const firstUser = messages.find(m => m.role === "user");
      const title = firstUser ? firstUser.content.slice(0, 50) : "Ny chatt";
      chats[currentChatId] = { title, messages: [...messages], updatedAt: Date.now() };
      saveChats();
      renderChatList();
    }

    function deleteChat(id) {
      delete chats[id];
      saveChats();
      if (currentChatId === id) newChat();
      renderChatList();
    }

    function toggleSidebar() {
      sidebarEl.classList.toggle("open");
      overlayEl.classList.toggle("show");
    }
    function closeSidebar() {
      sidebarEl.classList.remove("open");
      overlayEl.classList.remove("show");
    }

    inputEl.addEventListener("input", () => {
      const hasText = !!inputEl.value.trim();
      sendBtn.disabled = !hasText || loading;
      imgBtn.disabled = !hasText || loading;
    });

    function autoGrow(el) {
      el.style.height = "auto";
      el.style.height = Math.min(el.scrollHeight, 120) + "px";
    }

    function handleKey(e) {
      if (e.key === "Enter" && !e.shiftKey) { e.preventDefault(); send(); }
    }

    function scrollDown() {
      msgsContainer.scrollTop = msgsContainer.scrollHeight;
    }

    function renderMarkdown(text) {
      let html = text
        .replace(/```(\w*)\n([\s\S]*?)```/g, '<pre><code>$2</code></pre>')
        .replace(/`([^`]+)`/g, '<code>$1</code>')
        .replace(/\*\*(.+?)\*\*/g, '<strong>$1</strong>')
        .replace(/\*(.+?)\*/g, '<em>$1</em>')
        .replace(/^[-*] (.+)$/gm, '<li>$1</li>')
        .replace(/^\d+\. (.+)$/gm, '<li>$1</li>');
      html = html.replace(/((?:<li>.*<\/li>\n?)+)/g, '<ul>$1</ul>');
      html = html.split(/\n\n+/).map(p => {
        p = p.trim();
        if (!p) return '';
        if (p.startsWith('<pre>') || p.startsWith('<ul>') || p.startsWith('<ol>')) return p;
        return '<p>' + p.replace(/\n/g, '<br>') + '</p>';
      }).join('');
      return html;
    }

    const userSvg = '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M19 21v-2a4 4 0 0 0-4-4H9a4 4 0 0 0-4 4v2"/><circle cx="12" cy="7" r="4"/></svg>';
    const botSvg = '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M12 8V4H8"/><rect width="16" height="12" x="4" y="8" rx="2"/><path d="M2 14h2"/><path d="M20 14h2"/><path d="M15 13v2"/><path d="M9 13v2"/></svg>';

    function addMessage(role, content) {
      const div = document.createElement("div");
      div.className = "msg " + role;
      div.innerHTML = `
        <div class="msg-avatar">${role === "user" ? userSvg : botSvg}</div>
        <div class="msg-bubble">${role === "user" ? '<p>' + escapeHtml(content) + '</p>' : renderMarkdown(content)}</div>
      `;
      msgList.appendChild(div);
      return div;
    }

    function escapeHtml(str) {
      return str.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
    }

    function showTyping() {
      const div = document.createElement("div");
      div.className = "typing";
      div.id = "typingIndicator";
      div.innerHTML = `
        <div class="msg-avatar" style="background:var(--accent-bg);color:var(--accent-fg)">${botSvg}</div>
        <div class="typing-dots"><div class="typing-dot"></div><div class="typing-dot"></div><div class="typing-dot"></div></div>
      `;
      msgList.appendChild(div);
      scrollDown();
    }

    function hideTyping() {
      const el = document.getElementById("typingIndicator");
      if (el) el.remove();
    }

    async function send(text) {
      const content = (text || inputEl.value).trim();
      if (!content || loading) return;

      inputEl.value = "";
      inputEl.style.height = "auto";
      sendBtn.disabled = true;
      loading = true;

      emptyEl.style.display = "none";
      msgList.style.display = "flex";

      messages.push({ role: "user", content });
      addMessage("user", content);
      scrollDown();
      showTyping();

      try {
        const resp = await fetch(CHAT_URL, {
          method: "POST",
          headers: {
            "Content-Type": "application/json",
            "Authorization": "Bearer " + ANON_KEY,
          },
          body: JSON.stringify({ messages }),
        });

        hideTyping();

        if (!resp.ok) {
          const errMsg = resp.status === 429 ? "För många förfrågningar, vänta lite." :
                         resp.status === 402 ? "Krediter slut." : "Något gick fel.";
          addMessage("assistant", errMsg);
          loading = false;
          sendBtn.disabled = false;
          return;
        }

        const reader = resp.body.getReader();
        const decoder = new TextDecoder();
        let buffer = "";
        let assistantText = "";
        let assistantDiv = null;

        while (true) {
          const { done, value } = await reader.read();
          if (done) break;
          buffer += decoder.decode(value, { stream: true });

          let idx;
          while ((idx = buffer.indexOf("\n")) !== -1) {
            let line = buffer.slice(0, idx);
            buffer = buffer.slice(idx + 1);
            if (line.endsWith("\r")) line = line.slice(0, -1);
            if (!line.startsWith("data: ")) continue;
            const json = line.slice(6).trim();
            if (json === "[DONE]") break;
            try {
              const parsed = JSON.parse(json);
              const delta = parsed.choices?.[0]?.delta?.content;
              if (delta) {
                assistantText += delta;
                if (!assistantDiv) {
                  assistantDiv = addMessage("assistant", assistantText);
                } else {
                  assistantDiv.querySelector(".msg-bubble").innerHTML = renderMarkdown(assistantText);
                }
                scrollDown();
              }
            } catch {
              buffer = line + "\n" + buffer;
              break;
            }
          }
        }

        if (assistantText) {
          messages.push({ role: "assistant", content: assistantText });
        }
        saveCurrentChat();

      } catch (err) {
        hideTyping();
        addMessage("assistant", "Kunde inte ansluta till AI:n. Kontrollera din internetanslutning.");
      }

      loading = false;
      sendBtn.disabled = !inputEl.value.trim();
      inputEl.focus();
      scrollDown();
    }

    // Init
    loadChats();
    renderChatList();
    // Load saved theme
    const savedTheme = localStorage.getItem(THEME_KEY);
    if (savedTheme !== null) applyTheme(parseInt(savedTheme));
    else renderWheel();
  </script>
</body>
</html>
